<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-labelledby="profile-title profile-desc">
  <title id="profile-title">Mano Toth</title>
  <desc id="profile-desc">Profile photo placeholder with initials MT</desc>
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <linearGradient id="initials" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d1d5db"/>
    </linearGradient>
    <linearGradient id="initials-accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <radialGradient id="hero-glow" cx="50%" cy="15%" r="65%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="frame">
      <rect x="8" y="8" width="384" height="384" rx="28"/>
    </clipPath>
  </defs>

  <rect width="400" height="400" rx="32" fill="#111827"/>
  <rect width="400" height="400" rx="32" fill="url(#hero-glow)"/>
  <rect width="400" height="400" rx="32" fill="url(#grid)"/>

  <rect x="2" y="2" width="396" height="396" rx="30" fill="none" stroke="url(#ring)" stroke-width="3"/>

  <g clip-path="url(#frame)">
    <rect x="8" y="8" width="384" height="384" fill="#0f172a"/>
    <rect x="8" y="8" width="384" height="384" fill="url(#grid)"/>
    <circle cx="320" cy="88" r="48" fill="#10b981" fill-opacity="0.08"/>
    <circle cx="72" cy="312" r="64" fill="#34d399" fill-opacity="0.06"/>

    <text x="200" y="235" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="800" letter-spacing="-10">
      <tspan fill="url(#initials)">M</tspan><tspan fill="url(#initials-accent)">T</tspan>
    </text>

    <circle cx="318" cy="318" r="10" fill="#34d399" fill-opacity="0.9"/>
    <circle cx="318" cy="318" r="10" fill="#34d399">
      <animate attributeName="opacity" values="1;0.45;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
